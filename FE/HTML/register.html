<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Receipt Gen</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/styles.css">
  <style>
    /* Register-specific: two-column form grid inside split-right */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 24px;
      width: 100%;
    }
    .form-grid .form-row.full { grid-column: 1 / -1; }

    .form-row select {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid #e0d8cc;
      background: transparent;
      padding: 12px 0;
      font-family: 'Instrument Serif', serif;
      font-size: 18px;
      color: #1a1410;
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.3s;
    }
    .form-row select:focus { border-bottom-color: #1a1410; }

    /* widen the right panel slightly for the two-col form */
    .split-right { width: 520px; padding: 48px 60px; }

    .split-right h1 { font-size: 38px; }
  </style>
</head>
<body>
  <div class="split">

    <!-- LEFT: dark panel, same as login -->
    <div class="split-left">
      <div class="receipt-preview">
        <div class="rp-title">RECEIPT GENERATOR</div>
        <div class="rp-row"><span>Wireless Mouse</span><span>$25.99</span></div>
        <div class="rp-row"><span>Mechanical Keyboard</span><span>$89.50</span></div>
        <div class="rp-row"><span>Antivirus License</span><span>$49.99</span></div>
        <div class="rp-row rp-tax"><span>Tax (8%)</span><span>$13.24</span></div>
        <div class="rp-total"><span>TOTAL</span><span>$178.72</span></div>
        <div class="rp-thanks">Thank you for your visit!</div>
      </div>
      <p class="tagline">Generate · Print · Manage</p>
    </div>

    <!-- RIGHT: register form -->
    <div class="split-right">
      <p class="logo">
        <img src="./Assets/logo.png" alt="Receipt Gen" class="login-logo" width="200" height="100" />
      </p>

      <h1>Create<br><em>account.</em></h1>
      <p class="subtitle">Set up your system access.</p>

      <div id="error-msg" class="error-msg"></div>

      <div class="form-grid">
        <div class="form-row">
          <label for="full_name">Full Name</label>
          <input id="full_name" type="text" placeholder="Jane Smith" autocomplete="name" />
        </div>

        <div class="form-row">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="jane.smith" autocomplete="username" />
        </div>

        <div class="form-row full">
          <label for="email">Email Address</label>
          <input id="email" type="email" placeholder="jane@company.com" autocomplete="email" />
        </div>

        <div class="form-row">
          <label for="role">Role</label>
          <select id="role">
            <option value="" disabled selected>Select role</option>
            <option value="Cashier">Cashier</option>
            <option value="Manager">Manager</option>
            <option value="Admin">Admin</option>
          </select>
        </div>

        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="new-password" />
        </div>

        <div class="form-row full">
          <label for="confirm_password">Confirm Password</label>
          <input id="confirm_password" type="password" placeholder="••••••••" autocomplete="new-password" />
        </div>
      </div>

      <button class="login-btn" id="register-btn">Create Account</button>

      <p class="signup-link">Already have an account? <a href="login.html">Sign In</a></p>
    </div>
  </div>

  <script src="../JS/register.js"></script>
</body>
</html>

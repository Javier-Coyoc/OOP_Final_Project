<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Receipt Gen</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
  <div class="split">

    <!-- LEFT: dark panel - smaller preview -->
    <div class="split-left">
      <div class="receipt-preview">
        <div class="rp-title">RECEIPT GENERATOR</div>
        <div class="rp-row"><span>Wireless Mouse</span><span>$25.99</span></div>
        <div class="rp-row"><span>Mechanical Keyboard</span><span>$89.50</span></div>
        <div class="rp-row"><span>Antivirus License</span><span>$49.99</span></div>
        <div class="rp-row rp-tax"><span>Tax (8%)</span><span>$13.24</span></div>
        <div class="rp-total"><span>TOTAL</span><span>$178.72</span></div>
        <div class="rp-thanks">Thank you for your visit!</div>
      </div>
      <p class="tagline">Generate · Print · Manage</p>
    </div>

    <!-- RIGHT: LARGER register form -->
    <div class="split-right">
      <img src="../HTML/Assets/logo.png" alt="Receipt Gen" class="login-logo" />

      <h1>Create<br><em>account.</em></h1>
      <p class="subtitle">Set up your system access.</p>

      <div id="error-msg" class="error-msg"></div>

      <div class="form-grid">
        <div class="form-row">
          <label for="full_name">Full Name</label>
          <input id="full_name" type="text" placeholder="Jane Smith" />
        </div>

        <div class="form-row">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="jane.smith" />
        </div>

        <div class="form-row full">
          <label for="email">Email Address</label>
          <input id="email" type="email" placeholder="jane@company.com" />
        </div>

        <div class="form-row">
          <label for="role">Role</label>
          <select id="role">
            <option value="" disabled selected>Select role</option>
            <option value="Cashier">Cashier</option>
            <option value="Manager">Manager</option>
            <option value="Admin">Admin</option>
          </select>
        </div>

        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" />
        </div>

        <div class="form-row full">
          <label for="confirm_password">Confirm Password</label>
          <input id="confirm_password" type="password" placeholder="••••••••" />
        </div>
      </div>

      <button class="login-btn" id="register-btn">Create Account</button>

      <p class="signup-link">Already have an account? <a href="login.html">Sign In</a></p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const registerBtn = document.getElementById('register-btn');
      const errorMsg = document.getElementById('error-msg');
      
      registerBtn.addEventListener('click', async function(e) {
        e.preventDefault();
        
        const full_name = document.getElementById('full_name').value.trim();
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const role = document.getElementById('role').value;
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;
        
        errorMsg.style.display = 'none';
        
        if (!full_name || !username || !email || !role || !password || !confirm) {
          errorMsg.textContent = 'All fields are required';
          errorMsg.style.display = 'block';
          errorMsg.style.color = '#c0392b';
          errorMsg.style.backgroundColor = '#fee';
          errorMsg.style.padding = '12px';
          errorMsg.style.borderRadius = '6px';
          return;
        }
        
        if (password !== confirm) {
          errorMsg.textContent = 'Passwords do not match';
          errorMsg.style.display = 'block';
          errorMsg.style.color = '#c0392b';
          errorMsg.style.backgroundColor = '#fee';
          errorMsg.style.padding = '12px';
          errorMsg.style.borderRadius = '6px';
          return;
        }
        
        if (password.length < 4) {
          errorMsg.textContent = 'Password must be at least 4 characters';
          errorMsg.style.display = 'block';
          errorMsg.style.color = '#c0392b';
          errorMsg.style.backgroundColor = '#fee';
          errorMsg.style.padding = '12px';
          errorMsg.style.borderRadius = '6px';
          return;
        }
        
        registerBtn.disabled = true;
        registerBtn.textContent = 'Creating account...';
        
        try {
          const response = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ full_name, username, email, role, password })
          });
          
          const data = await response.json();
          
          if (response.ok) {
            errorMsg.textContent = '✅ Account created successfully! Redirecting to login...';
            errorMsg.style.display = 'block';
            errorMsg.style.color = '#155724';
            errorMsg.style.backgroundColor = '#d4edda';
            errorMsg.style.padding = '12px';
            errorMsg.style.borderRadius = '6px';
            
            setTimeout(() => {
              window.location.href = 'login.html';
            }, 1500);
          } else {
            errorMsg.textContent = data.message || 'Registration failed';
            errorMsg.style.display = 'block';
            errorMsg.style.color = '#c0392b';
            errorMsg.style.backgroundColor = '#fee';
            errorMsg.style.padding = '12px';
            errorMsg.style.borderRadius = '6px';
            registerBtn.disabled = false;
            registerBtn.textContent = 'Create Account';
          }
        } catch (error) {
          errorMsg.textContent = '❌ Cannot connect to server. Make sure backend is running on port 3000';
          errorMsg.style.display = 'block';
          errorMsg.style.color = '#c0392b';
          errorMsg.style.backgroundColor = '#fee';
          errorMsg.style.padding = '12px';
          errorMsg.style.borderRadius = '6px';
          registerBtn.disabled = false;
          registerBtn.textContent = 'Create Account';
        }
      });
    });
  </script>
</body>
</html>
